# Smithery MCP Server Registry Configuration
# Docs: https://smithery.ai/docs/build/publish
#
# twilize ships as a *stdio* MCP server on Smithery so the server runs on the
# user's own machine and has direct access to their local filesystem (CSV
# input, .twbx output, reference images for styling).  That local access is
# fundamental to what twilize does — a remote-only deployment would have no
# way to read the user's `Sample - Superstore.csv` or write a `.twbx` back
# into `~/Downloads`.
#
# Smithery's one-click install reads this file and writes the resulting
# command into the user's MCP client config (Cursor, Claude Desktop, VS Code,
# Claude Code, Windsurf, ...).  No pip / manual setup required on the user's
# side — `uvx` fetches the latest twilize release from PyPI on first launch.

startCommand:
  type: stdio

  # Everything here is optional; defaults give the user the latest published
  # twilize release with standard logging and no extra integrations.
  configSchema:
    type: object
    title: Twilize
    description: >-
      Configuration for the twilize Tableau workbook builder MCP server. All
      fields are optional — the defaults launch the latest published release
      from PyPI.
    properties:
      version:
        type: string
        title: twilize version
        description: >-
          Pin a specific release from PyPI (e.g. "0.34.0"). Leave blank to
          always use the latest published version.
        default: ""
      extras:
        type: string
        title: Optional extras
        description: >-
          Comma-separated list of PyPI extras to install alongside twilize.
          Valid values: "pipeline" (CSV→Hyper conversion, required for the
          csv_to_dashboard pipeline), "examples" (Hyper-backed example
          workbooks), "extension" (Dashboard Extension backend), "mysql",
          "mssql". Example: "pipeline,examples".
        default: "pipeline"
      logLevel:
        type: string
        title: Python log level
        description: >-
          Root Python logging level for the server process. Useful when
          debugging a client integration.
        enum: [DEBUG, INFO, WARNING, ERROR, CRITICAL]
        default: INFO
    required: []

  exampleConfig:
    version: ""
    extras: "pipeline"
    logLevel: INFO

  # Produces the CLI command Smithery writes into the user's MCP client
  # config.  We use `uvx` (from astral-sh/uv) because it:
  #   • fetches and caches the wheel on first launch (no pre-install step),
  #   • isolates twilize's deps from the system Python,
  #   • supports the `package[extra]` / `package==version` pin syntax.
  commandFunction: |-
    (config) => {
      const extras = (config.extras || "")
        .split(",")
        .map((s) => s.trim())
        .filter(Boolean);
      const extrasSpec = extras.length ? `[${extras.join(",")}]` : "";
      const versionSpec = config.version ? `==${config.version}` : "";
      const pkg = `twilize${extrasSpec}${versionSpec}`;
      return {
        command: "uvx",
        args: [pkg],
        env: {
          // Force unbuffered stdout so stdio framing is never stuck in a
          // Python buffer when a client is slow to read.
          PYTHONUNBUFFERED: "1",
          PYTHONIOENCODING: "utf-8",
          // twilize's server reads MCP_LOG_LEVEL in HTTP mode; harmless in
          // stdio mode and handy for users who switch transports.
          MCP_LOG_LEVEL: (config.logLevel || "INFO").toLowerCase(),
        },
      };
    }
