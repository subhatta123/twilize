# =============================================================================
# Comparison Template
# =============================================================================
# Side-by-side equal charts for comparing categories, segments, or metrics.
# Best when the analytical question is "how do A and B compare?"
# =============================================================================

name: "comparison"
description: "Side-by-side equal charts for comparing categories or segments"
author: "twilize"

suitability:
  requires:
    has_ranking_dimension: true
  prefers:
    chart_count_min: 2
    chart_count_max: 4
    kpi_count_min: 0
    kpi_count_max: 2
    chart_type_present:
      - "Bar"
  suited_for_domains:
    - "retail_sales"
    - "finance"
    - "marketing"
    - "hr"

zones:
  - zone_id: "title"
    type: "text"
    fixed_size: 70
    position: "top"

  - zone_id: "filter_bar"
    type: "filter_panel"
    position: "top"
    fixed_size: 30
    style: "horizontal"

  - zone_id: "kpi_row"
    type: "kpi_container"
    direction: "horizontal"
    fixed_size: 80
    max_slots: 2
    position: "top"

  - zone_id: "chart_grid"
    type: "chart_container"
    direction: "grid_2col"
    weight: 1
    slots: 4
    preferred_chart_types:
      - "Bar"
      - "Line"
      - "Heatmap"
      - "Pie"

recommended_theme: "vibrant"

auto_actions:
  - type: "highlight"
    from: "chart_grid.0"
    to: "all_others"
    on: "on-select"
