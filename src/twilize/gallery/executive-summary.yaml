# =============================================================================
# Executive Summary Template
# =============================================================================
# KPI-heavy top row + 2-column analytical charts below.
# The most common dashboard pattern for business stakeholders.
# =============================================================================

name: "executive-summary"
description: "KPI row + 2-column chart grid — the most common business dashboard"
author: "twilize"

# --- When is this template a good fit? ---
suitability:
  requires:
    has_ranking_dimension: true
  prefers:
    kpi_count_min: 2
    kpi_count_max: 4
    chart_count_min: 2
    chart_count_max: 4
    chart_type_present:
      - "Bar"
      - "Line"
  suited_for_domains:
    - "retail_sales"
    - "finance"
    - "marketing"
    - "hr"

# --- Layout zones ---
zones:
  - zone_id: "title"
    type: "text"
    fixed_size: 70
    position: "top"

  - zone_id: "filter_bar"
    type: "filter_panel"
    position: "top"
    fixed_size: 30
    style: "horizontal"

  - zone_id: "kpi_row"
    type: "kpi_container"
    direction: "horizontal"
    fixed_size: 100
    max_slots: 5
    position: "top"

  - zone_id: "chart_grid"
    type: "chart_container"
    direction: "grid_2col"
    weight: 1
    slots: 4
    preferred_chart_types:
      - "Bar"
      - "Line"
      - "Area"
      - "Pie"
      - "Map"

# --- Theme recommendation ---
recommended_theme: "modern-light"

# --- Auto-actions ---
auto_actions:
  - type: "filter"
    from: "chart_grid.0"
    to: "all_others"
    on: "on-select"
