# =============================================================================
# Twilize Dashboard Creation Rules (Package Bundle)
# =============================================================================
# This file is bundled inside the twilize package for the rules_engine.
# It uses the unified key format shared with references/dashboard_rules.yaml.
#
# Rule severities:
#   error   — blocks the tool call, must be fixed before proceeding
#   warning — appended to tool response, agent should address but not blocked
#   info    — logged, no action required
# =============================================================================

version: 1

# ---------------------------------------------------------------------------
# KPI / Big Ass Number Rules
# ---------------------------------------------------------------------------
kpi:
  font_size: 22
  font_color: "#333333"
  bold: true
  row_height: 100
  max_kpis: 4
  max_metrics_per_kpi_card: 5
  placement: "top_row"
  require_comparison_context: true
  ordering: "primary_metric_first_then_ratios_then_volume"
  severity: "warning"

  shorten_names:
    "SUM(Sales)": "Sales"
    "SUM(Profit)": "Profit"
    "SUM(Quantity)": "Quantity"
    "SUM(Revenue)": "Revenue"
    "SUM(Cost)": "Cost"
    "AVG(Discount)": "Avg Discount"
    "AVG(Satisfaction)": "Satisfaction"
    "COUNTD(Order ID)": "Orders"
    "COUNTD(Customer ID)": "Customers"
    "COUNTD(Product ID)": "Products"

  number_formats:
    - match: [rate, ratio, pct, percent, margin, yield, share, penetration, conversion, churn, retention, utilization, efficiency, coverage, discount]
      format: "0.00%"
      description: "Rates and percentages (2 decimal places)"

    - match: [sales, revenue, price, cost, profit, amount, income, expense, fee, payment, budget, spend, earning, total]
      format: "$#,##0"
      description: "Currency values (whole dollars, fits KPI tiles)"

    - match: [quantity, count, number, num, qty, units, items, orders, transactions]
      format: "#,##0"
      description: "Counts and quantities (full number)"

  default_format: "#,##0"

  # Maximum decimal places shown in KPI values (caps all formats)
  max_decimal_places: 2

  aggregation_overrides:
    COUNT: "#,##0"
    COUNTD: "#,##0"

# ---------------------------------------------------------------------------
# Chart Defaults & Composition Rules
# ---------------------------------------------------------------------------
charts:
  max_charts: 9
  max_charts_per_dashboard: 9
  max_chart_types_per_dashboard: 3
  require_at_least_one_kpi: true
  severity: "error"

  # When true, if there are empty chart slots in the template after
  # deduplication, fill them with the next-strongest signal charts
  # (relaxes max_per_type from 1 to 2 for highest-scoring types).
  fill_available_space: true

  bar_top_n: 10
  axis_format: "#,##0"
  pie_max_slices: 5
  scatter_min_points: 15
  map_null_threshold: 0.10
  map_latlong_null_threshold: 0.20
  theme: "modern-light"

# ---------------------------------------------------------------------------
# Map Rules
# ---------------------------------------------------------------------------
map_rules:
  min_geo_coverage_pct: 80
  min_unique_locations: 4
  required_encodings:
    - "color"
    - "tooltip"
  warn_if_no_legend: true
  severity: "warning"

  prefer_bar_chart_when:
    - "question_is_ranking_by_region"
    - "precise_value_comparison_needed"
    - "fewer_than_4_geographic_values"

# ---------------------------------------------------------------------------
# Theme Rules
# ---------------------------------------------------------------------------
theme_rules:
  require_theme: true
  default_theme: "modern-light"
  apply_to_all_dashboards: true
  color_accessibility: "colorblind_safe"
  severity: "warning"

  defaults:
    background: "#e6e6e6"
    card_background: "#ffffff"
    filter_bar_background: "#192f3e"
    font_family: "Tableau Book"

# ---------------------------------------------------------------------------
# Bar Chart Rules
# ---------------------------------------------------------------------------
bar_chart_rules:
  must_sort_descending: true
  axis_starts_at_zero: true
  max_categories: 15
  prefer_horizontal: true
  never_for_time_series: true
  auto_fix_sort: true
  severity: "warning"

# ---------------------------------------------------------------------------
# Line Chart Rules
# ---------------------------------------------------------------------------
line_chart_rules:
  only_for_temporal_data: true
  max_color_series: 6
  require_continuous_axis: true
  severity: "warning"

# ---------------------------------------------------------------------------
# Pie Chart Rules
# ---------------------------------------------------------------------------
pie_chart_rules:
  max_slices: 5
  require_sum_to_100: true
  suggest_bar_chart_above: 5
  severity: "warning"

# ---------------------------------------------------------------------------
# Scatter Plot Rules
# ---------------------------------------------------------------------------
scatter_plot_rules:
  min_data_points: 15
  min_color_cardinality: 6
  suggest_bar_chart_below: 6
  severity: "warning"

# ---------------------------------------------------------------------------
# Layout Rules
# ---------------------------------------------------------------------------
layout:
  # Dashboard sizing mode: "range" (default) or "fixed".
  sizing_mode: "range"
  # Range dimensions (min/max). Used when sizing_mode is "range".
  min_width: 1200
  min_height: 600
  max_width: 1700
  max_height: 1000
  # Fallback fixed dimensions (used when sizing_mode is "fixed").
  width: 1200
  height: 800
  # Background color applied to the entire dashboard (all zones).
  background_color: "#e6e6e6"
  card_background: "#ffffff"
  require_information_hierarchy: true
  kpi_position: "top"
  primary_view_position: "center"
  filter_sidebar_position: "right"
  require_filter_sidebar: true
  max_dashboard_width: 1400
  max_dashboard_height: 900
  severity: "warning"

  template: "executive-summary"

  title:
    height: 70
    font_size: 20
    font_color: "#111e29"
    bold: true

  filters:
    height: 30
    font_size: 12
    background_color: "#192f3e"
    font_color: "#ffffff"
    max_filters: 3
    # Filter apply mode: all (global), allUsingRelatedDatasource, selected
    apply_mode: "all"

  card_margin: 4
  outer_margin: 8

# ---------------------------------------------------------------------------
# Aggregation Rules
# ---------------------------------------------------------------------------
aggregation_rules:
  auto_detect_from_name: true
  severity: "info"

  rates_and_percentages:
    aggregation: "AVG"
    keywords:
      - "discount"
      - "margin"
      - "rate"
      - "ratio"
      - "percentage"
      - "pct"
      - "share"
      - "yield"
      - "efficiency"
      - "conversion"
      - "bounce"
      - "churn"
      - "retention"
      - "satisfaction"
      - "score"
      - "rating"

  amounts_and_values:
    aggregation: "SUM"
    keywords:
      - "sales"
      - "profit"
      - "revenue"
      - "cost"
      - "price"
      - "amount"
      - "total"
      - "budget"
      - "spend"
      - "income"
      - "expense"

  counts_and_quantities:
    aggregation: "SUM"
    keywords:
      - "quantity"
      - "orders"
      - "number"
      - "transactions"
      - "visits"
      - "clicks"

  identifiers:
    aggregation: "COUNTD"
    keywords:
      - "id"
      - "key"
      - "code"
      - "identifier"
      - "uuid"

# ---------------------------------------------------------------------------
# Number Format Rules
# ---------------------------------------------------------------------------
number_format_rules:
  auto_detect_from_name: true
  severity: "info"

  mappings:
    currency: "$#,##0"
    percentage: "0.00%"
    integer: "#,##0"
    decimal: "#,##0.00"

  field_patterns:
    currency:
      - "sales"
      - "profit"
      - "revenue"
      - "cost"
      - "price"
      - "amount"
      - "budget"
      - "income"
      - "expense"
    percentage:
      - "rate"
      - "ratio"
      - "pct"
      - "percentage"
      - "margin"
      - "discount"
      - "share"
      - "churn"
      - "conversion"
    integer:
      - "count"
      - "quantity"
      - "number"
      - "orders"
      - "visits"
