# ─────────────────────────────────────────────────────────────────────
# Twilize Dashboard Rules
# ─────────────────────────────────────────────────────────────────────
# This YAML file controls how dashboards are generated by the pipeline.
# Place a copy named "dashboard_rules.yaml" next to your CSV file or
# in your working directory to override defaults.
#
# The pipeline searches for rules in this order (first found wins):
#   1. <csv_dir>/dashboard_rules.yaml
#   2. <cwd>/dashboard_rules.yaml
#   3. Built-in defaults (this file)
# ─────────────────────────────────────────────────────────────────────

# ── KPI / Big-Ass-Number Formatting ──────────────────────────────────
kpi:
  # Font size for KPI values (Tableau points).  15 = compact, 28-36 = BAN style.
  font_size: 28

  # Font color for KPI values (hex).
  font_color: "#333333"

  # Bold KPI text?
  bold: true

  # Fixed height of the KPI row in pixels.
  row_height: 120

  # Maximum number of KPI cards in one row.
  max_kpis: 4

  # Number formatting rules.
  # Each rule has a "match" (keyword list checked against field name, case-insensitive)
  # and a "format" (Tableau custom number format string).
  # Rules are evaluated top-to-bottom; first match wins.
  # If no rule matches, "default_format" is used.
  number_formats:
    - match: [rate, ratio, pct, percent, margin, yield, share, penetration, conversion, churn, retention, utilization, efficiency, coverage, discount]
      format: "0.0%"
      description: "Rates and percentages"

    - match: [sales, revenue, price, cost, profit, amount, income, expense, fee, payment, budget, spend, earning, total]
      format: "$#,##0,K"
      description: "Currency values (abbreviated with K)"

    - match: [quantity, count, number, num, qty, units, items, orders, transactions]
      format: "#,##0"
      description: "Counts and quantities (full number)"

  # Fallback format when no rule matches.
  default_format: "#,##0,K"

  # Aggregation-based overrides (applied AFTER field-name matching).
  # If the aggregation is COUNT or COUNTD, use this format regardless of field name.
  aggregation_overrides:
    COUNT: "#,##0"
    COUNTD: "#,##0"

# ── Layout ───────────────────────────────────────────────────────────
layout:
  # Dashboard dimensions in pixels.
  width: 1200
  height: 800

  # Background color for the dashboard canvas.
  background_color: "#e6e6e6"

  # Card (chart/KPI) background color.
  card_background: "#ffffff"

  # Title bar settings.
  title:
    height: 70
    font_size: 20
    font_color: "#111e29"
    bold: true

  # Filter bar settings.
  filters:
    height: 30
    font_size: 12
    background_color: "#192f3e"
    font_color: "#ffffff"
    max_filters: 3

  # Gap between cards (inner margin, pixels).
  card_margin: 4

  # Outer gutter margin (edges, pixels).
  outer_margin: 8

  # Preferred layout template name.
  # Options: executive-summary, kpi-detail, left-filter, featured-detail,
  #          comparison, overview, grid
  template: "executive-summary"

# ── Chart Defaults ───────────────────────────────────────────────────
charts:
  # Maximum number of charts (including KPIs) per dashboard.
  max_charts: 9

  # Maximum categories before applying Top-N filter on bar charts.
  bar_top_n: 10

  # Axis number format for non-KPI charts (measures on axes).
  axis_format: "#,##0"

  # Maximum pie chart slices (viz best practice: max 5).
  pie_max_slices: 5

  # Minimum distinct data points for a scatter plot to be meaningful.
  scatter_min_points: 15

  # Geographic data quality: max null ratio for geocoded-name fields (State, City).
  # Fields with more nulls than this get their Map replaced with a Bar chart.
  map_null_threshold: 0.10

  # Geographic data quality: max null ratio for lat/long numeric fields.
  # More lenient because lat/long data is more reliable than geocoded names.
  map_latlong_null_threshold: 0.20

  # Theme preset name.
  # Options: modern-light, corporate-blue, dark, minimal, vibrant
  # Aliases: modern-dark → dark, classic → corporate-blue
  theme: "modern-light"
